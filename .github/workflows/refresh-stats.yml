name: Refresh GitHub stats cards

# Generates the profile stat cards as static SVGs straight from the GitHub API
# (no third-party render service) and commits them. If the API call fails the
# generator keeps the previously committed cards, so the profile never shows
# broken icons.

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: refresh-stats
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate cards
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: ${{ github.repository_owner }}
        run: python3 .github/scripts/generate_stats.py

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- assets; then
            echo "No changes to commit."
          else
            git add assets/github-stats.svg assets/top-langs.svg
            git commit -m "chore: refresh GitHub stats cards"
            git push
          fi
